name: Update Parser

on:
  workflow_dispatch:
  schedule:
    - cron: '30 7 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build parser
        run: node Parser/scripts/build-parser.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Parser/upstream/resource-parser.js Parser/myParser.js
          git diff --cached --quiet && exit 0
          git commit -m "chore(parser): update upstream parser"
          git push
